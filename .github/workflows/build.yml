name: CI – Analyze & Build APK

on:
  push:
    branches: [ main, larger-model, beam-search ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Static analysis
  # ─────────────────────────────────────────────
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  # ─────────────────────────────────────────────
  # Job 2: Build release APK
  # ─────────────────────────────────────────────
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download STT model (sherpa-onnx streaming zipformer FULL)
        run: |
          mkdir -p /tmp/sherpa_model assets/models assets/sounds
          touch assets/sounds/alarm.mp3
          echo "Downloading sherpa-onnx FULL (non-mobile) zipformer model..."
          curl -L "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-zipformer-en-2023-06-26.tar.bz2" \
            -o /tmp/model.tar.bz2
          tar xjf /tmp/model.tar.bz2 -C /tmp/sherpa_model
          # Copy and rename from temp dir — avoids same-file collision with placeholders
          find /tmp/sherpa_model -name "encoder*.onnx" | head -1 | xargs -I{} cp {} assets/models/encoder.onnx
          find /tmp/sherpa_model -name "decoder*.onnx" | head -1 | xargs -I{} cp {} assets/models/decoder.onnx
          find /tmp/sherpa_model -name "joiner*.onnx"  | head -1 | xargs -I{} cp {} assets/models/joiner.onnx
          find /tmp/sherpa_model -name "tokens.txt"    | head -1 | xargs -I{} cp {} assets/models/tokens.txt
          echo "Model files ready:"
          ls -lh assets/models/*.onnx assets/models/tokens.txt

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: radioscribe-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
