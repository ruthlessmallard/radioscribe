name: CI – Analyze & Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Static analysis
  # ─────────────────────────────────────────────
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  # ─────────────────────────────────────────────
  # Job 2: Build release APK
  # ─────────────────────────────────────────────
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download STT model (sherpa-onnx streaming zipformer)
        run: |
          mkdir -p assets/models assets/sounds
          touch assets/sounds/alarm.mp3
          cd assets/models
          echo "Downloading sherpa-onnx mobile model..."
          curl -L "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-zipformer-en-2023-06-21-mobile.tar.bz2" -o model.tar.bz2
          tar xjf model.tar.bz2
          # Copy and rename to the paths expected by audio_service.dart
          find . -name "encoder*.onnx" | head -1 | xargs -I{} cp {} encoder.onnx
          find . -name "decoder*.onnx" | head -1 | xargs -I{} cp {} decoder.onnx
          find . -name "joiner*.onnx"  | head -1 | xargs -I{} cp {} joiner.onnx
          find . -name "tokens.txt"    | head -1 | xargs -I{} cp {} tokens.txt
          rm -rf model.tar.bz2 sherpa-onnx-*
          echo "Model files ready:"
          ls -lh *.onnx *.txt

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: radioscribe-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
