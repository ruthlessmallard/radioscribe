name: radioscribe
description: Underground mine radio traffic monitor with speech-to-text and keyword alerting.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.0
  record: ^6.2.0
  sherpa_onnx: ^1.12.28
  path: ^1.9.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  audioplayers: ^6.1.0
  flutter_slidable: ^3.1.1
  wakelock_plus: ^1.2.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/encoder.onnx
    - assets/models/decoder.onnx
    - assets/models/joiner.onnx
    - assets/models/tokens.txt
    - assets/sounds/alarm.mp3
    - assets/sounds/chirp.mp3
    - assets/icon.png
