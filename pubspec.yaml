name: radioscribe
description: Underground mine radio traffic monitor with speech-to-text and keyword alerting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.0
  record: ^5.1.2
  vosk_flutter: ^0.3.46
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  audioplayers: ^6.1.0
  flutter_slidable: ^3.1.1
  wakelock_plus: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/sounds/
